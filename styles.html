        display: none !important
    }

    tr.hidden-lg {
        display: none !important
    }

    th.hidden-lg,
    td.hidden-lg {
        display: none !important
    }
}

.visible-print {
    display: none !important
}

tr.visible-print {
    display: none !important
}

th.visible-print,
td.visible-print {
    display: none !important
}

@media print {
    .visible-print {
        display: block !important
    }

    tr.visible-print {
        display: table-row !important
    }

    th.visible-print,
    td.visible-print {
        display: table-cell !important
    }

    .hidden-print {
        display: none !important
    }

    tr.hidden-print {
        display: none !important
    }

    th.hidden-print,
    td.hidden-print {
        display: none !important
    }
}
